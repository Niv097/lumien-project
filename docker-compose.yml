version: '3.8'

services:
  db:
    image: postgres:14
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fiducia_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: 
      context: ./fiducia-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/fiducia_saas
      - SECRET_KEY=production-secret-key-change-this
    volumes:
      - .:/project_root
      - ./I4C_Simulated_Demo_Dataset.xlsx:/app/I4C_Simulated_Demo_Dataset.xlsx
    depends_on:
      - db
    restart: always
    command: >
      sh -c "
      pip install pandas openpyxl xlrd python-multipart &&
      uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build: 
      context: ./fiducia-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
